AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Dror Barak automations — ClickUp webhook receiver.

  API Gateway fronts a Lambda that verifies ClickUp's signature, de-duplicates the
  delivery against a DynamoDB table, and dispatches to the automation.

  Deploy:
    sam build && sam deploy --guided --stack-name dror-automations-dev
  Test locally, no AWS:
    sam local start-api

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  ClickUpWebhookSecret:
    Type: String
    NoEcho: true
    Description: Returned by ClickUp when the webhook is registered.
  AutomationToken:
    Type: String
    NoEcho: true
    Description: >
      Shared secret for the button endpoint. ClickUp's Automation webhooks are not
      signed, so this header is the only thing separating a genuine button press
      from anyone who finds the URL. Generate with:
      python -c "import secrets;print(secrets.token_urlsafe(32))"
  ClickUpApiToken:
    Type: String
    NoEcho: true
  ClickUpListId:
    Type: String
    Description: The לקוחות list.
  ClickUpTasksListId:
    Type: String
    Default: ""
    Description: The משימות list. Empty disables the Claude Code bridge.
  ClickUpTeamId:
    Type: String
  SignLinkSecret:
    Type: String
    NoEcho: true
    Description: >
      Signs the per-client signing links. The client has no account, so the link
      IS the credential: without this, guessing a client id would be enough to
      open or sign someone's contract. Generate with:
      python -c "import secrets;print(secrets.token_urlsafe(48))"
  DriveClientsParentId:
    Type: String
    Description: Drive folder that holds client folders; signed PDFs land here.
  GoogleSecretArn:
    Type: String
    Description: >
      Secrets Manager ARN holding the Google service-account key. The key is NOT a
      parameter: Lambda caps all environment variables at 4KB combined and the key
      alone is 2.3KB, CloudFormation splits parameter values on commas (which the
      JSON is full of), and a credential passed as a parameter lingers in the
      stack's history. Create it with:
      aws secretsmanager create-secret --name dror/google-service-account
      --secret-string file://key.json
  GoogleImpersonateSubject:
    Type: String
    Description: >
      The Workspace user the service account acts as. No default: a deploy that
      silently impersonates someone is worse than one that asks.
  SignBaseUrl:
    Type: String
    Default: ""
    Description: >
      Public base URL signing links are issued under, e.g.
      https://xxx.execute-api.eu-central-1.amazonaws.com/dev — deliberately a
      parameter rather than !Ref WebhookApi: the function's environment referring
      to the API, while the API's routes come from the function, is a circular
      dependency CloudFormation refuses. Read it from the SignBaseUrl output after
      the first deploy and pass it on the next; the id is stable across updates.
  ProviderName:
    Type: String
    Description: The provider's side of the contract — see PROVIDER_* in .env.example.
  ProviderBusinessId:
    Type: String
  ProviderAddress:
    Type: String
  ProviderPhone:
    Type: String
  ProviderEmail:
    Type: String
  ProviderBank:
    Type: String
  ProviderBankBranch:
    Type: String
  ProviderBankAccount:
    Type: String
  DrorEmail:
    Type: String
    Default: ""
    Description: Where signature notifications and the daily report go.
  SmtpHost:
    Type: String
    Default: ""
  SmtpPort:
    Type: String
    Default: "587"
  SmtpUser:
    Type: String
    Default: ""
  SmtpPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      For Gmail/Workspace this is an App Password, not the account password.
      Empty until Dror provides it — email delivery falls back to posting the link
      on the ClickUp task, so the signing flow works either way.
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: >
      Claude API key for the AI automations (social prep, strategy, campaign
      recommendations). ~108 chars, well within the 4KB env limit, so unlike the
      Google key it is a plain env var rather than a secret fetch.
  MetaAccessToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Meta system-user token with ads_read, for the monthly campaign report. A
      long string but far under the 4KB env limit, so a plain env var like the
      Anthropic key rather than a secret fetch. There is deliberately no
      META_AD_ACCOUNT_ID here: the ad account is per-client, read from the
      חשבון מודעות Meta field in ClickUp — a single global would risk one client's
      spend landing in another client's report.
  MetaBaseUrl:
    Type: String
    Default: "https://graph.facebook.com/v21.0"
    Description: Meta Graph API base URL. Bump the version here when Meta deprecates one.
  ManyChatApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      ManyChat API key (Settings → API). Powers the Smoove → ManyChat webhook:
      find/create the WhatsApp contact and trigger a Flow. Needs a paid ManyChat
      plan. Empty until Dror provides it — the Smoove endpoint then only works in
      WEBHOOK_DRY_RUN=1.
  ManyChatConsentPhrase:
    Type: String
    Default: ""
    Description: >
      Meta's required opt-in proof, recorded when a contact is created via the API.
      Must truthfully describe how the person consented to WhatsApp messages.
  ManyChatBaseUrl:
    Type: String
    Default: "https://api.manychat.com"
  ManyChatFlowAiAgents:
    Type: String
    Default: ""
    Description: >
      ManyChat Flow id sent when Smoove posts msg="ai_agents". The msg→Flow map is
      env-driven: a new message type is a new MANYCHAT_FLOW_<MSG> variable, no code
      change. An unmapped msg is rejected rather than sent to a default.
  ManyChatFlow1142673:
    Type: String
    Default: ""
    Description: >
      ManyChat Flow id (flow_ns) sent when Smoove posts msg="1142673" — the leads
      from Smoove list 1142673. flow_ns is the content..._... segment of the flow's
      ManyChat URL (…/cms/files/<flow_ns>/edit), e.g. content20260723124130_896802.
  ManyChatFlow889128:
    Type: String
    Default: ""
    Description: >
      ManyChat Flow id (flow_ns) sent when Smoove posts msg="889128" — the leads
      from Smoove list 889128, e.g. content20260723124251_658385.
  SmooveWebhookToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Optional shared secret for the Smoove endpoint. Empty = open (anyone who
      finds the URL can create contacts and fire billed Flows). Set it, and have
      Smoove send it as the X-Smoove-Token header (or ?token=), to require auth.
  WebhookDryRun:
    Type: String
    Default: "1"
    AllowedValues: ["0", "1"]
    Description: >
      1 = accept real ClickUp events and prove the wiring, but let the automations
      touch nothing (no Drive folders, no Morning clients, no WhatsApp). Deploy
      with 1 first, watch the logs, then redeploy with 0 to go live.

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    # Generous: onboarding calls Drive, Morning and WhatsApp in sequence. Well
    # under Lambda's 15-minute ceiling, but not so tight that a slow Drive call
    # times out mid-onboarding and leaves a half-created client.
    Timeout: 180
    Architectures: [arm64]
    Environment:
      Variables:
        IDEMPOTENCY_TABLE: !Ref IdempotencyTable
        RUN_LOG_TABLE: !Ref RunLogTable
        CLICKUP_WEBHOOK_SECRET: !Ref ClickUpWebhookSecret
        AUTOMATION_TOKEN: !Ref AutomationToken
        CLICKUP_API_TOKEN: !Ref ClickUpApiToken
        CLICKUP_LIST_ID: !Ref ClickUpListId
        CLICKUP_TASKS_LIST_ID: !Ref ClickUpTasksListId
        CLICKUP_TEAM_ID: !Ref ClickUpTeamId
        WEBHOOK_DRY_RUN: !Ref WebhookDryRun
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        META_ACCESS_TOKEN: !Ref MetaAccessToken
        META_BASE_URL: !Ref MetaBaseUrl
        DROR_EMAIL: !Ref DrorEmail
        SMTP_HOST: !Ref SmtpHost
        SMTP_PORT: !Ref SmtpPort
        SMTP_USER: !Ref SmtpUser
        SMTP_PASSWORD: !Ref SmtpPassword
        SIGN_LINK_SECRET: !Ref SignLinkSecret
        SIGN_BASE_URL: !Ref SignBaseUrl
        DRIVE_CLIENTS_PARENT_ID: !Ref DriveClientsParentId
        GOOGLE_SECRET_ARN: !Ref GoogleSecretArn
        GOOGLE_IMPERSONATE_SUBJECT: !Ref GoogleImpersonateSubject
        # The contract refuses to render without these, so a deploy that omits
        # them breaks signing. They are not template defaults precisely so that
        # failure is loud rather than a contract with no account to pay into.
        PROVIDER_NAME: !Ref ProviderName
        PROVIDER_BUSINESS_ID: !Ref ProviderBusinessId
        PROVIDER_ADDRESS: !Ref ProviderAddress
        PROVIDER_PHONE: !Ref ProviderPhone
        PROVIDER_EMAIL: !Ref ProviderEmail
        PROVIDER_BANK: !Ref ProviderBank
        PROVIDER_BANK_BRANCH: !Ref ProviderBankBranch
        PROVIDER_BANK_ACCOUNT: !Ref ProviderBankAccount
        # RUN_LOG_PATH is deliberately unset: with RUN_LOG_TABLE present the
        # DynamoDB backend is used. A file on Lambda's per-instance disk would be
        # thrown away seconds after it was written, and the run-log is the only
        # source for the dashboard and the daily email.

Resources:
  WebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      DefaultRouteSettings:
        # A public endpoint. ClickUp sends a handful of events a day; this stops a
        # flood from turning into a Lambda bill.
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "dror-webhook-${Stage}"
      CodeUri: ../
      Handler: src.lambda_handler.lambda_handler
      Description: Receives ClickUp webhooks, verifies, de-duplicates, dispatches.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RunLogTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref GoogleSecretArn
      Events:
        ClickUpWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /clickup
            Method: POST
        # Button presses. Same Lambda, different path: this one is authenticated
        # by header rather than signature, because Automation webhooks are not
        # signed the way API-registered webhooks are.
        ButtonAction:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /action
            Method: POST
        # The client-facing signing page. Public by necessity -- the client has
        # no account -- so the signed token in the URL is the credential.
        SignPageGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /sign
            Method: GET
        SignPagePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /sign
            Method: POST
        # The strategy questionnaire — our own form, same token scheme as signing.
        QuestionnaireGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /questionnaire
            Method: GET
        QuestionnairePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /questionnaire
            Method: POST

  # A separate API + function for Smoove: a different source, payload and blast
  # radius from the ClickUp webhook, deliberately kept standalone so one cannot
  # affect the other.
  SmooveApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  SmooveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "dror-smoove-${Stage}"
      CodeUri: ../
      Handler: src.smoove_handler.lambda_handler
      Description: Smoove lead -> find/create ManyChat contact -> trigger a Flow.
      Environment:
        Variables:
          MANYCHAT_API_KEY: !Ref ManyChatApiKey
          MANYCHAT_BASE_URL: !Ref ManyChatBaseUrl
          MANYCHAT_CONSENT_PHRASE: !Ref ManyChatConsentPhrase
          MANYCHAT_FLOW_AI_AGENTS: !Ref ManyChatFlowAiAgents
          # msg=<list id> → the list's Flow. Smoove list 1142673 and 889128 each
          # POST their own list id as msg; unmapped ids are rejected, not defaulted.
          MANYCHAT_FLOW_1142673: !Ref ManyChatFlow1142673
          MANYCHAT_FLOW_889128: !Ref ManyChatFlow889128
          SMOOVE_WEBHOOK_TOKEN: !Ref SmooveWebhookToken
      Policies:
        # Dedup retries across instances, and log to the run-log so Smoove leads
        # show up in the dashboard and daily email like every other automation.
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RunLogTable
      Events:
        SmooveWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SmooveApi
            Path: /smoove
            Method: POST

  RunLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "dror-runlog-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: day
          AttributeType: S
        - AttributeName: ts_id
          AttributeType: S
      KeySchema:
        # Partitioned by day: the dashboard asks for "the last N days", which is
        # then N small queries rather than a scan. One partition for everything
        # would be simpler and would make every read hot on a single key.
        - AttributeName: day
          KeyType: HASH
        - AttributeName: ts_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        # This is the only copy of what the automations did. It is cheap at this
        # volume, and losing it means losing the dashboard's whole history.
        PointInTimeRecoveryEnabled: true

  ReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "dror-reminders-${Stage}"
      CodeUri: ../
      Handler: src.scheduled.reminders_handler
      Description: Daily — chase unsigned contracts at 2 and 4 days.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RunLogTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref GoogleSecretArn
      Events:
        Daily:
          Type: Schedule
          Properties:
            # 07:00 UTC = 09:00-10:00 Israel. A morning nudge, not a 3am one.
            Schedule: cron(0 7 * * ? *)
            Description: Send signature reminders

  CampaignReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "dror-campaign-report-${Stage}"
      CodeUri: ../
      Handler: src.scheduled.campaign_report_handler
      Description: Monthly — one campaign report per active client, fanned out.
      # Overrides the 180s global. The dispatcher only lists clients and returns
      # in seconds, but each fan-out child does a Meta call + an Opus completion +
      # three Drive calls + SMTP, ~1-2 min; a per-client invoke gets the room.
      Timeout: 900
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RunLogTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref GoogleSecretArn
        # Lets the dispatcher async-invoke itself once per client.
        - LambdaInvokePolicy:
            FunctionName: !Sub "dror-campaign-report-${Stage}"
      EventInvokeConfig:
        # Async invokes retry twice by default. A retry here does not fix a bad
        # report — it emails Dror a second and third copy of it.
        MaximumRetryAttempts: 0
      Events:
        Monthly:
          Type: Schedule
          Properties:
            # 07:00 UTC on the 1st — the month it reports is closed and settled.
            Schedule: cron(0 7 1 * ? *)
            Description: Monthly campaign reports

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "dror-idempotency-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        # DynamoDB expires old claims itself, so the table cannot grow forever.
        # The window is far longer than any ClickUp retry.
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

Outputs:
  WebhookUrl:
    Description: Register this in ClickUp (python -m src.tools.register_clickup_webhook)
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/clickup"
  SignBaseUrlOut:
    Description: Pass this back in as the SignBaseUrl parameter on the next deploy.
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  ActionUrl:
    Description: >
      Button endpoint. In each Button field's Automation, Call webhook to
      <this>?action=send_quote with header X-Automation-Token.
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/action"
  SmooveWebhookUrl:
    Description: >
      Point Smoove's HTTP/webhook action here (POST). If SmooveWebhookToken is set,
      add the X-Smoove-Token header (or ?token=) to the call.
    Value: !Sub "https://${SmooveApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/smoove"
  IdempotencyTableName:
    Value: !Ref IdempotencyTable
  RunLogTableName:
    Description: Feeds the dashboard and the daily email.
    Value: !Ref RunLogTable
