AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Dror Barak automations — ClickUp webhook receiver.

  API Gateway fronts a Lambda that verifies ClickUp's signature, de-duplicates the
  delivery against a DynamoDB table, and dispatches to the automation.

  Deploy:
    sam build && sam deploy --guided --stack-name dror-automations-dev
  Test locally, no AWS:
    sam local start-api

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  ClickUpWebhookSecret:
    Type: String
    NoEcho: true
    Description: Returned by ClickUp when the webhook is registered.
  AutomationToken:
    Type: String
    NoEcho: true
    Description: >
      Shared secret for the button endpoint. ClickUp's Automation webhooks are not
      signed, so this header is the only thing separating a genuine button press
      from anyone who finds the URL. Generate with:
      python -c "import secrets;print(secrets.token_urlsafe(32))"
  ClickUpApiToken:
    Type: String
    NoEcho: true
  ClickUpListId:
    Type: String
    Description: The לקוחות list.
  ClickUpTasksListId:
    Type: String
    Default: ""
    Description: The משימות list. Empty disables the Claude Code bridge.
  ClickUpTeamId:
    Type: String
  SignLinkSecret:
    Type: String
    NoEcho: true
    Description: >
      Signs the per-client signing links. The client has no account, so the link
      IS the credential: without this, guessing a client id would be enough to
      open or sign someone's contract. Generate with:
      python -c "import secrets;print(secrets.token_urlsafe(48))"
  DriveClientsParentId:
    Type: String
    Description: Drive folder that holds client folders; signed PDFs land here.
  GoogleServiceAccountJson:
    Type: String
    NoEcho: true
    Description: The service-account key JSON, on one line.
  GoogleImpersonateSubject:
    Type: String
    Description: >
      The Workspace user the service account acts as. No default: a deploy that
      silently impersonates someone is worse than one that asks.
  SignBaseUrl:
    Type: String
    Default: ""
    Description: >
      Public base URL signing links are issued under, e.g.
      https://xxx.execute-api.eu-central-1.amazonaws.com/dev — deliberately a
      parameter rather than !Ref WebhookApi: the function's environment referring
      to the API, while the API's routes come from the function, is a circular
      dependency CloudFormation refuses. Read it from the SignBaseUrl output after
      the first deploy and pass it on the next; the id is stable across updates.
  ProviderName:
    Type: String
    Description: The provider's side of the contract — see PROVIDER_* in .env.example.
  ProviderBusinessId:
    Type: String
  ProviderAddress:
    Type: String
  ProviderPhone:
    Type: String
  ProviderEmail:
    Type: String
  ProviderBank:
    Type: String
  ProviderBankBranch:
    Type: String
  ProviderBankAccount:
    Type: String
  WebhookDryRun:
    Type: String
    Default: "1"
    AllowedValues: ["0", "1"]
    Description: >
      1 = accept real ClickUp events and prove the wiring, but let the automations
      touch nothing (no Drive folders, no Morning clients, no WhatsApp). Deploy
      with 1 first, watch the logs, then redeploy with 0 to go live.

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    # Generous: onboarding calls Drive, Morning and WhatsApp in sequence. Well
    # under Lambda's 15-minute ceiling, but not so tight that a slow Drive call
    # times out mid-onboarding and leaves a half-created client.
    Timeout: 180
    Architectures: [arm64]
    Environment:
      Variables:
        IDEMPOTENCY_TABLE: !Ref IdempotencyTable
        CLICKUP_WEBHOOK_SECRET: !Ref ClickUpWebhookSecret
        AUTOMATION_TOKEN: !Ref AutomationToken
        CLICKUP_API_TOKEN: !Ref ClickUpApiToken
        CLICKUP_LIST_ID: !Ref ClickUpListId
        CLICKUP_TASKS_LIST_ID: !Ref ClickUpTasksListId
        CLICKUP_TEAM_ID: !Ref ClickUpTeamId
        WEBHOOK_DRY_RUN: !Ref WebhookDryRun
        SIGN_LINK_SECRET: !Ref SignLinkSecret
        SIGN_BASE_URL: !Ref SignBaseUrl
        DRIVE_CLIENTS_PARENT_ID: !Ref DriveClientsParentId
        GOOGLE_SERVICE_ACCOUNT_JSON: !Ref GoogleServiceAccountJson
        GOOGLE_IMPERSONATE_SUBJECT: !Ref GoogleImpersonateSubject
        # The contract refuses to render without these, so a deploy that omits
        # them breaks signing. They are not template defaults precisely so that
        # failure is loud rather than a contract with no account to pay into.
        PROVIDER_NAME: !Ref ProviderName
        PROVIDER_BUSINESS_ID: !Ref ProviderBusinessId
        PROVIDER_ADDRESS: !Ref ProviderAddress
        PROVIDER_PHONE: !Ref ProviderPhone
        PROVIDER_EMAIL: !Ref ProviderEmail
        PROVIDER_BANK: !Ref ProviderBank
        PROVIDER_BANK_BRANCH: !Ref ProviderBankBranch
        PROVIDER_BANK_ACCOUNT: !Ref ProviderBankAccount
        # NOTE: /tmp is per-instance and vanishes. The run-log is the only source
        # for the dashboard and the daily email, so both will be empty until this
        # moves to DynamoDB. Tracked in TASKS.md.
        RUN_LOG_PATH: /tmp/run_log.jsonl

Resources:
  WebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      DefaultRouteSettings:
        # A public endpoint. ClickUp sends a handful of events a day; this stops a
        # flood from turning into a Lambda bill.
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "dror-webhook-${Stage}"
      CodeUri: ../
      Handler: src.lambda_handler.lambda_handler
      Description: Receives ClickUp webhooks, verifies, de-duplicates, dispatches.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
      Events:
        ClickUpWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /clickup
            Method: POST
        # Button presses. Same Lambda, different path: this one is authenticated
        # by header rather than signature, because Automation webhooks are not
        # signed the way API-registered webhooks are.
        ButtonAction:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /action
            Method: POST
        # The client-facing signing page. Public by necessity -- the client has
        # no account -- so the signed token in the URL is the credential.
        SignPageGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /sign
            Method: GET
        SignPagePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /sign
            Method: POST

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "dror-idempotency-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        # DynamoDB expires old claims itself, so the table cannot grow forever.
        # The window is far longer than any ClickUp retry.
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

Outputs:
  WebhookUrl:
    Description: Register this in ClickUp (python -m src.tools.register_clickup_webhook)
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/clickup"
  SignBaseUrlOut:
    Description: Pass this back in as the SignBaseUrl parameter on the next deploy.
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  ActionUrl:
    Description: >
      Button endpoint. In each Button field's Automation, Call webhook to
      <this>?action=send_quote with header X-Automation-Token.
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/action"
  IdempotencyTableName:
    Value: !Ref IdempotencyTable
